<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard ออเดอร์ — Misuland กำแพงแสน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+Thai+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--cream:#F5E6C8;--cream2:#FFF8EE;--cream3:#FBEFD6;--sand:#F0DDB8;--brown:#5C2D0A;--brown2:#7A4A20;--muted:#A0704A;--accent:#E8743B;--green:#2D6A4F;--border:#E8CDAA;--shadow-sm:0 6px 16px -8px rgba(92,45,10,.4);}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Baloo Thai 2',system-ui,sans-serif;}
body{background:var(--cream);color:var(--brown);padding-bottom:40px;}
.wrap{max-width:920px;margin:0 auto;padding:0 14px;}
header{background:linear-gradient(160deg,var(--brown),var(--brown2));color:#fff;padding:14px 0;position:sticky;top:0;z-index:20;box-shadow:var(--shadow-sm);}
header .wrap{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
header h1{font-size:18px;color:#fff;}
header .live{font-size:12px;background:#2D6A4F;padding:3px 9px;border-radius:12px;}
header input[type=date]{margin-left:auto;border:none;border-radius:10px;padding:7px 10px;font-family:inherit;font-size:14px;}
header button#reload{border:none;border-radius:10px;padding:7px 12px;background:var(--accent);color:#fff;font-weight:700;cursor:pointer;}
header button#clearday{border:none;border-radius:10px;padding:7px 12px;background:#922B21;color:#fff;font-weight:700;cursor:pointer;}

#gate{position:fixed;inset:0;background:var(--brown);display:flex;align-items:center;justify-content:center;z-index:100;flex-direction:column;gap:14px;color:#fff;padding:20px;text-align:center;}
#gate input{padding:12px 16px;border-radius:12px;border:none;font-size:16px;font-family:inherit;text-align:center;}
#gate button{padding:11px 28px;border-radius:24px;border:none;background:var(--accent);color:#fff;font-weight:800;font-size:15px;cursor:pointer;}

.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(86px,1fr));gap:10px;margin:16px 0;}
.sum{background:var(--cream2);border:1px solid var(--border);border-radius:14px;padding:12px;text-align:center;}
.sum.closed{background:#F2E3DF;border-color:#E0B4AC;}
.sum b{display:block;font-size:13px;color:var(--accent);}
.sum .c{font-size:24px;font-weight:800;}
.sum .m{font-size:11.5px;color:var(--brown2);}

.roundhdr{margin:20px 0 8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.roundhdr .t{font-size:17px;font-weight:800;}
.roundhdr .tm{font-size:13px;color:var(--muted);}
.roundhdr .toggle{margin-left:auto;border:none;border-radius:20px;padding:7px 16px;font-family:inherit;font-weight:700;font-size:13.5px;cursor:pointer;}
.toggle.open{background:#FADBD8;color:#922B21;}
.toggle.closed{background:#D4EFDF;color:#1E8449;}
.pill-closed{font-size:11.5px;font-weight:700;background:#922B21;color:#fff;padding:2px 9px;border-radius:12px;}
.empty{color:var(--muted);font-size:14px;padding:10px 0;}

.order{background:var(--cream2);border:1px solid var(--border);border-radius:16px;padding:12px 14px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;}
.order.s-ยกเลิก{opacity:.5;}
.order.s-ส่งแล้ว{opacity:.7;}
.order .q{flex:0 0 auto;width:42px;height:42px;border-radius:12px;background:var(--sand);display:grid;place-items:center;font-weight:800;font-size:18px;color:var(--brown);}
.order .body{flex:1;min-width:0;}
.order .top{display:flex;justify-content:space-between;gap:10px;align-items:baseline;}
.order .who{font-weight:700;font-size:15.5px;}
.order .tot{font-weight:800;font-size:16px;color:var(--green);}
.order .dorm{font-size:13.5px;color:var(--brown2);}
.order .items{font-size:13.5px;margin:6px 0;line-height:1.6;}
.order .note{font-size:13px;color:var(--accent);}
.order .row2{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap;}
.order .row2 a.slip{font-size:13px;color:#fff;background:var(--brown2);padding:6px 13px;border-radius:14px;text-decoration:none;}
.order select{font-family:inherit;font-size:14px;border:1.5px solid var(--border);border-radius:12px;padding:7px 10px;background:#fff;color:var(--brown);font-weight:700;}
.order .row2 button.del{font-family:inherit;font-size:13px;font-weight:700;color:#922B21;background:#FADBD8;border:none;border-radius:14px;padding:7px 13px;cursor:pointer;}
.order .ct{font-size:12.5px;color:var(--muted);}
.badge{font-size:11.5px;font-weight:700;padding:2px 9px;border-radius:12px;}
.b-รอตรวจสลิป{background:#FDEBD0;color:#B9770E;}
.b-ยืนยันแล้ว{background:#D4EFDF;color:#1E8449;}
.b-กำลังทำ{background:#D6EAF8;color:#2471A3;}
.b-ส่งแล้ว{background:#D5DBDB;color:#566573;}
.b-ยกเลิก{background:#FADBD8;color:#922B21;}
</style>
</head>
<body>

<div id="gate">
  <div style="font-size:40px">🔒</div>
  <div>Dashboard ร้าน — ใส่รหัสผ่าน</div>
  <input id="pass" type="password" placeholder="รหัสผ่าน" autocomplete="off">
  <button id="enter">เข้าสู่ระบบ</button>
</div>

<header>
  <div class="wrap">
    <h1>🍞 ออเดอร์กำแพงแสน</h1>
    <span class="live" id="live">● realtime</span>
    <input type="date" id="date">
    <button id="reload">รีเฟรช</button>
    <button id="clearday">🗑 ล้างวันนี้</button>
    <a href="stats.html" style="font-size:12.5px;background:rgba(255,255,255,.15);color:#fff;padding:7px 12px;border-radius:10px;text-decoration:none;font-weight:700;">📊 สรุปยอด</a>
  </div>
</header>

<div class="wrap">
  <div class="summary" id="summary"></div>
  <div id="board"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const CFG=window.MISULAND_CONFIG;
const supa=window.supabase.createClient(CFG.SUPABASE_URL,CFG.SUPABASE_ANON_KEY);
const ROUNDS=[1,2,3,4,5];
const ROUND_TIME={1:"16:00–16:45",2:"18:00–18:45",3:"19:45–20:30",4:"ไม่เกิน 21:30",5:"พร้อมส่งเลย · ตอนคิวว่าง"};
const RLABEL=r=>r===5?'รับเลย':'รอบ '+r;
// รอบ "รับเลย" (5) ปกติปิด เปิดเมื่อ round_state.closed=false เท่านั้น
function isClosed(n){ return n===5 ? (roundClosed[n]!==false) : !!roundClosed[n]; }
let _ac=null; // audio context สำหรับเสียงแจ้งเตือน
function beep(){
  try{
    _ac=_ac||new (window.AudioContext||window.webkitAudioContext)();
    if(_ac.state==='suspended') _ac.resume();
    const t0=_ac.currentTime;
    [[0,880],[0.18,1175]].forEach(([t,f])=>{
      const o=_ac.createOscillator(),g=_ac.createGain();
      o.type='sine'; o.frequency.value=f; o.connect(g); g.connect(_ac.destination);
      g.gain.setValueAtTime(0.0001,t0+t);
      g.gain.exponentialRampToValueAtTime(0.35,t0+t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t0+t+0.16);
      o.start(t0+t); o.stop(t0+t+0.18);
    });
  }catch(e){console.warn('beep failed',e);}
}
const STATUSES=["รอตรวจสลิป","ยืนยันแล้ว","กำลังทำ","ส่งแล้ว","ยกเลิก"];

document.getElementById('enter').onclick=tryPass;
document.getElementById('pass').addEventListener('keydown',e=>{if(e.key==='Enter')tryPass();});
function tryPass(){
  if(document.getElementById('pass').value===CFG.ADMIN_PASSCODE){
    document.getElementById('gate').style.display='none';
    try{_ac=_ac||new (window.AudioContext||window.webkitAudioContext)();}catch(e){} // warm-up เสียง (ต้องมาจาก user gesture)
    init();
  }
  else{document.getElementById('pass').value='';document.getElementById('pass').placeholder='รหัสผิด ลองใหม่';}
}
function thaiDate(){return new Date(Date.now()+7*3600*1000).toISOString().slice(0,10);}
const dateEl=document.getElementById('date');

let rows=[]; let roundClosed={};
async function load(){
  const d=dateEl.value||thaiDate();
  const [o,rs]=await Promise.all([
    supa.from('orders').select('*').eq('order_date',d).order('created_at',{ascending:true}),
    supa.from('round_state').select('round,closed').eq('order_date',d),
  ]);
  if(o.error){document.getElementById('board').innerHTML='<div class="empty">โหลดไม่ได้: '+o.error.message+'</div>';return;}
  rows=o.data||[]; roundClosed={}; (rs.data||[]).forEach(r=>roundClosed[r.round]=r.closed);
  render();
}
function fmtTime(ts){return new Date(ts).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bangkok'});}

async function clearDay(){
  const d=dateEl.value||thaiDate();
  if(!confirm(`ล้างออเดอร์ทั้งหมดของวันที่ ${d}?\nคิวจะเริ่มนับ #1 ใหม่ในวันถัดไป (กู้คืนไม่ได้)`)) return;
  const o=await supa.from('orders').delete().eq('order_date',d);
  if(o.error){alert('ลบไม่สำเร็จ: '+o.error.message+'\n(ยังไม่ได้รัน schema-v4.sql ใน Supabase?)');return;}
  await supa.from('round_state').delete().eq('order_date',d); // รีเซ็ตสถานะเปิด/ปิดรอบด้วย
  load();
}

async function toggleRound(r){
  const d=dateEl.value||thaiDate();
  const prev=roundClosed[r];
  const next=!isClosed(r); // ค่า closed ใหม่ (สลับสถานะ — รองรับรอบรับเลยที่ default ปิด)
  roundClosed[r]=next; render();
  const {error}=await supa.from('round_state').upsert({order_date:d,round:r,closed:next},{onConflict:'order_date,round'});
  if(error){alert('เปลี่ยนสถานะรอบไม่สำเร็จ: '+error.message); roundClosed[r]=prev; render();}
}

function render(){
  // เลขคิวรันต่อเนื่องทั้งวัน (rows เรียงตาม created_at อยู่แล้ว) ตรงกับที่ลูกค้าเห็น
  const dayNo={}; rows.forEach((o,i)=>dayNo[o.id]=i+1);
  const sumEl=document.getElementById('summary'); sumEl.innerHTML='';
  ROUNDS.forEach(r=>{
    const rs=rows.filter(o=>o.round===r&&o.status!=='ยกเลิก');
    const cnt=rs.length, baht=rs.reduce((s,o)=>s+o.total,0);
    sumEl.innerHTML+=`<div class="sum ${isClosed(r)?'closed':''}"><b>${RLABEL(r)}${isClosed(r)?' 🔒':''}</b><div class="c">${cnt}</div><div class="m">฿${baht}</div></div>`;
  });
  const board=document.getElementById('board'); board.innerHTML='';
  ROUNDS.forEach(r=>{
    const rs=rows.filter(o=>o.round===r);
    const closed=isClosed(r);
    const hdr=document.createElement('div'); hdr.className='roundhdr';
    hdr.innerHTML=`<span class="t">${RLABEL(r)}</span><span class="tm">${ROUND_TIME[r]}</span>
      ${closed?'<span class="pill-closed">ปิดรับแล้ว</span>':''}
      <button class="toggle ${closed?'closed':'open'}">${closed?'↻ เปิดรอบ':'⛔ ปิดรอบ'}</button>`;
    hdr.querySelector('.toggle').onclick=()=>toggleRound(r);
    board.appendChild(hdr);
    if(!rs.length){board.insertAdjacentHTML('beforeend','<div class="empty">— ยังไม่มีออเดอร์ —</div>');return;}
    rs.forEach(o=>board.appendChild(orderCard(o,dayNo[o.id])));
  });
}

function orderCard(o,qno){
  const el=document.createElement('div'); el.className='order s-'+o.status;
  const itemsTxt=o.items.map(it=>`${it.name} ×${it.qty}`).join(' · ');
  const opts=STATUSES.map(s=>`<option ${s===o.status?'selected':''}>${s}</option>`).join('');
  el.innerHTML=`
    <div class="q">#${qno}</div>
    <div class="body">
      <div class="top"><div class="who">${esc(o.name)} <span class="badge b-${o.status}">${o.status}</span></div><div class="tot">฿${o.total}</div></div>
      <div class="dorm">📍 ${esc(o.dorm)} · 📞 ${esc(o.contact)}</div>
      <div class="items">${esc(itemsTxt)}</div>
      <div class="ct">🚚 ค่าส่ง ฿${o.shipping||0} · ยอดโอนรวม ฿${o.total}</div>
      ${o.note?`<div class="note">📝 ${esc(o.note)}</div>`:''}
      <div class="row2">
        ${o.slip_url?`<a class="slip" href="${o.slip_url}" target="_blank">🧾 ดูสลิป</a>`:'<span class="ct">ไม่มีสลิป</span>'}
        <select>${opts}</select>
        <button class="del">🗑 ลบ</button>
        <span class="ct">⏱ ${fmtTime(o.created_at)}</span>
      </div>
    </div>`;
  el.querySelector('select').onchange=async(e)=>{
    const ns=e.target.value;
    const {error}=await supa.from('orders').update({status:ns}).eq('id',o.id);
    if(error){alert('อัปเดตไม่สำเร็จ: '+error.message);return;}
    o.status=ns; render();
  };
  el.querySelector('button.del').onclick=async()=>{
    if(!confirm(`ลบออเดอร์ของ ${o.name} (฿${o.total}) ออกถาวร?`)) return;
    const {error}=await supa.from('orders').delete().eq('id',o.id);
    if(error){alert('ลบไม่สำเร็จ: '+error.message+'\n(ยังไม่ได้รัน schema-v4.sql ใน Supabase?)');return;}
    rows=rows.filter(x=>x.id!==o.id); render();
  };
  return el;
}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function init(){
  dateEl.value=thaiDate(); load();
  dateEl.onchange=load;
  document.getElementById('reload').onclick=load;
  document.getElementById('clearday').onclick=clearDay;
  supa.channel('rt').on('postgres_changes',{event:'*',schema:'public',table:'orders'},flash)
    .on('postgres_changes',{event:'*',schema:'public',table:'round_state'},flash).subscribe();
  function flash(payload){
    const d=dateEl.value||thaiDate();
    const rec=payload.new||payload.old;
    const isNew=payload.eventType==='INSERT'&&payload.table==='orders'&&rec&&rec.order_date===d;
    if(rec && rec.order_date===d) load();
    const live=document.getElementById('live');
    if(isNew){ beep(); live.textContent='🔔 ออเดอร์ใหม่!'; }
    else live.textContent='● อัปเดต!';
    setTimeout(()=>live.textContent='● realtime',2800);
  }
}
</script>
</body>
</html>
